name = "landing-guiasuniversitarias"
main = "src/worker.ts"
compatibility_date = "2026-05-30"
routes = [
  { pattern = "guiasuniversitarias.com/*", zone_name = "guiasuniversitarias.com" },
  { pattern = "www.guiasuniversitarias.com/*", zone_name = "guiasuniversitarias.com" }
]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"

# Para activar captura de leads:
# wrangler secret put LEADS_WEBHOOK_URL
# El webhook puede ser Make, Zapier, Google Apps Script, Zoho Flow, etc.
